    text: 'Built bench/context_length_decode_test.py (3 conditions: ctx_min ~2K tok, ctx_50k ~50K tok, ctx_358k ~358K tok; N=3 cache-hit measurement calls each). Landed F24 in docs/THROUGHPUT_RESEARCH.md: ctx_50k vs ctx_358k decode tok/s medians 85.2 vs 85.0 (ranges 83.9-90.7 vs 84.5-87.1, near-total overlap) -- clean null result across a 7x context-length range, extending F4. ctx_min directionally lower (median 73.5) but confounded by a response-shape difference (end_turn at 283-367 tokens vs max_tokens truncation), disclosed honestly. Also found+fixed a real harness bug: thinking=disabled was omitting the thinking field rather than sending {type:disabled} explicitly, which does NOT reliably suppress server-side reasoning (8/9 initial trials burned their whole 3000-token budget on invisible redacted thinking) -- fixed in bench/synthetic_multiturn_test.py''s build_thinking_block. Gate green (ruff + 11/11 pytest).'
